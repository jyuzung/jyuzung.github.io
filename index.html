<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JyuZung · 博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f6f8fc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            line-height: 1.6;
            color: #1e293b;
        }

        /* ── 主卡片 ── */
        .card {
            max-width: 780px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 2.5rem;
            padding: 3rem 3rem 2.8rem;
            box-shadow:
                0 20px 60px -12px rgba(0, 20, 40, 0.20),
                0 8px 24px -8px rgba(0, 20, 40, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.25s ease;
        }

        @media (max-width: 520px) {
            .card {
                padding: 2rem 1.5rem 2rem;
                border-radius: 1.8rem;
            }
        }

        /* ── 头部 ── */
        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2.8rem;
            flex-wrap: wrap;
        }

        .avatar {
            width: 56px;
            height: 56px;
            border-radius: 18px;
            background: linear-gradient(135deg, #2d3b66, #1a2639);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.5px;
            box-shadow: 0 6px 16px -4px rgba(26, 38, 57, 0.30);
            flex-shrink: 0;
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .title-group h1 {
            font-size: 1.85rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1e293b, #3b4a62);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .title-group .sub {
            font-size: 0.9rem;
            font-weight: 400;
            color: #64748b;
            letter-spacing: 0.02em;
            margin-top: 0.05rem;
        }

        .title-group .sub span {
            display: inline-block;
            background: #e9edf4;
            padding: 0.1rem 0.7rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #334155;
            margin-left: 0.4rem;
            letter-spacing: 0;
        }

        /* ── 分割装饰 ── */
        .divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, #e2e8f0 0%, #cbd5e1 50%, #e2e8f0 100%);
            margin: 0 0 2.2rem 0;
            opacity: 0.6;
        }

        /* ── 导航 / 分类 ── */
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 2.6rem;
        }

        @media (max-width: 480px) {
            .nav-grid {
                grid-template-columns: 1fr;
                gap: 0.7rem;
            }
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            background: #f1f4f9;
            border-radius: 1.4rem;
            padding: 1.2rem 1.2rem 1rem;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            cursor: default;
            text-decoration: none;
            color: inherit;
        }

        .nav-item:hover {
            background: #ffffff;
            border-color: #d0d9e8;
            box-shadow: 0 8px 20px -10px rgba(0, 20, 40, 0.12);
            transform: translateY(-2px);
        }

        .nav-item .label {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .nav-item .label .icon {
            font-size: 1.2rem;
            line-height: 1;
        }

        .nav-item .desc {
            font-size: 0.8rem;
            font-weight: 400;
            color: #64748b;
            margin-top: 0.2rem;
            letter-spacing: 0.01em;
        }

        .nav-item .badge {
            margin-top: 0.5rem;
            font-size: 0.7rem;
            font-weight: 500;
            color: #475569;
            background: #e2e8f0;
            padding: 0.15rem 0.6rem;
            border-radius: 30px;
            align-self: flex-start;
            letter-spacing: 0.02em;
        }

        /* ── 项目子列表（优雅呈现） ── */
        .project-list {
            margin-top: 0.35rem;
            padding-left: 0;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .project-list li {
            list-style: none;
            font-size: 0.85rem;
            font-weight: 400;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .project-list li::before {
            content: "→";
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 300;
        }

        .project-list a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
            border-bottom: 1.5px solid transparent;
            transition: border-color 0.2s, color 0.2s;
            padding: 0.05rem 0;
        }

        .project-list a:hover {
            color: #1d4ed8;
            border-bottom-color: #93bbfc;
        }

        /* ── 底部信息 ── */
        .footer-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 0.6rem;
            padding-top: 1.2rem;
            border-top: 1px solid #e9edf4;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .footer-meta .social {
            display: flex;
            gap: 1.2rem;
        }

        .footer-meta .social a {
            text-decoration: none;
            color: #64748b;
            font-weight: 450;
            transition: color 0.2s;
            font-size: 0.8rem;
            letter-spacing: 0.01em;
        }

        .footer-meta .social a:hover {
            color: #0f172a;
        }

        /* ── 特殊：使 "笔记" 和 "读书" 不可点击但保持样式 ── */
        .nav-item.disabled {
            cursor: default;
            opacity: 0.75;
        }

        .nav-item.disabled:hover {
            transform: none;
            background: #f1f4f9;
            border-color: transparent;
            box-shadow: none;
        }

        /* ── 响应式微调 ── */
        @media (max-width: 400px) {
            .avatar {
                width: 44px;
                height: 44px;
                font-size: 1.2rem;
                border-radius: 14px;
            }
            .title-group h1 {
                font-size: 1.5rem;
            }
        }

        /* ── 装饰光晕 ── */
        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(37, 99, 235, 0.04) 0%, transparent 70%);
            top: -120px;
            right: -120px;
            z-index: -1;
            pointer-events: none;
        }

        .glow-2 {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(236, 72, 153, 0.03) 0%, transparent 70%);
            bottom: -180px;
            left: -180px;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 装饰光晕 -->
    <div class="glow"></div>
    <div class="glow-2"></div>

    <!-- ─── 主卡片 ─── -->
    <div class="card">

        <!-- 头部 -->
        <header class="header">
            <div class="avatar">JZ</div>
            <div class="title-group">
                <h1>JyuZung</h1>
                <div class="sub">
                    ✦ 个人博客
                    <span>v1.0</span>
                </div>
            </div>
        </header>

        <!-- 分割线 -->
        <div class="divider"></div>

        <!-- 导航网格 -->
        <div class="nav-grid">

            <!-- 1. 项目 -->
            <div class="nav-item">
                <div class="label">
                    <span class="icon">📁</span> 项目
                </div>
                <div class="desc">前端设计</div>
                <ul class="project-list">
                    <li><a href="./project/zishiyin/index.html">网页设计</a></li>
                </ul>
                <ul class="project-list">
                    <li><a href="./project/blog/index.html">托管博客</a></li>
                </ul>				
                <span class="badge">2 个作品</span>
            </div>

            <!-- 2. 笔记 (占位) -->
            <div class="nav-item disabled">
                <div class="label">
                    <span class="icon">📝</span> 笔记
                </div>
                <div class="desc">思考 · 记录 · 沉淀</div>
                <ul class="project-list">
                    <li><a href="https://blog.csdn.net/codjjfb/article/details/117339610">手写BP神经网络</a></li>
                </ul>				
                <span class="badge">1 个作品</span>
            </div>

            <!-- 3. 读书 (占位) -->
            <div class="nav-item disabled">
                <div class="label">
                    <span class="icon">📚</span> 读书
                </div>
                <div class="desc">书摘 · 感悟 · 推荐</div>
                <span class="badge">即将上线</span>
            </div>

        </div>

        <!-- 底部 -->
        <div class="footer-meta">
            <span>© 2026 JyuZung</span>
            <div class="social">
                <a href="#">GitHub</a>
                <a href="#">RSS</a>
                <a href="#">关于</a>
            </div>
        </div>

    </div>

</body>
</html>
